{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block main %}
<div class="container" style="margin-top: 50px;">
    <div class="row">
        <div class="col-md-8 col-md-offset-2">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Мій профіль</h3>
                </div>
                <div class="panel-body">
                    <p><strong>Username:</strong> {{ user.username }}</p>
                    <p><strong>Email:</strong> {{ user.email }}</p>
                    <p><strong>Дата реєстрації:</strong> {{ user.date_joined|date:"d.m.Y" }}</p>

                    <hr>

                    <h3>Редагувати дані</h3>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div style="margin-top: 20px;">
                            <button type="submit" class="btn btn-success">Зберегти зміни</button>
                        </div>
                    </form>

                    <hr>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Вийти (Logout)</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
